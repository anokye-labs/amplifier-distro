# =============================================================================
# GitHub Issue Triage Recipe
# =============================================================================
#
# Automated workflow for triaging GitHub issues against merged PRs.
# Fetches open issues and merged PRs, cross-references them, investigates
# the current code state per issue, verifies PR fixes by reading actual
# diffs, cross-validates all findings with a second LLM provider, and
# compiles everything into a structured triage report.
#
# Requirements:
#   - GitHub CLI (gh) installed and authenticated with repo access
#   - foundation bundle (provides zen-architect agent)
#   - At least one LLM provider configured (two recommended for cross-validation)
#   - jq installed (for JSON processing in bash steps)
#
# Usage:
#   amplifier run "execute github-issue-triage.yaml \
#     with repo_path=/path/to/repo repo_name=org/repo"
#
# Context variables:
#   - repo_path (required):  Local filesystem path to the cloned git repository
#   - repo_name (required):  GitHub org/repo identifier (e.g., "microsoft/amplifier")
#   - focus (optional):      Label filter — "bugs", "enhancements", or "all" (default: "bugs")
#   - max_issues (optional): Max issues to fetch; empty string = up to 200 (default: "")
#   - batch_size (optional): Issues per investigation batch (default: "5")
#   - report_path (optional): Output file path (default: <repo_path>/triage-report-<timestamp>.md)
#
# Stages:
#   1. discovery     — Fetch issues/PRs, cross-reference, produce initial triage
#                      [APPROVAL GATE: user selects which issues to investigate]
#   2. investigation — Deep code investigation, PR diff verification, cross-review
#                      [APPROVAL GATE: user reviews findings before report generation]
#   3. report        — Synthesize findings and write triage report to file
#
# Typical runtime: 15-45 minutes depending on issue count
#
# Provider strategy:
#   - Investigation steps prefer Anthropic (Provider A)
#   - Cross-review step prefers OpenAI (Provider B) for independent validation
#   - All steps include fallbacks so the recipe works with a single provider
#
# =============================================================================
# CHANGELOG
# =============================================================================
#
# v1.0.0 (2026-03-05):
#   - Initial recipe implementation
#   - Three-stage workflow with two approval gates
#   - Cross-provider validation (Anthropic for investigation, OpenAI for review)
#   - Batch processing for efficient issue investigation
#   - Automatic PR diff verification for linked PRs
#   - Atomic file write for report output
#   - Rate limiting to prevent API throttling
#
# =============================================================================

name: "github-issue-triage"
description: "Automated GitHub issue triage: cross-references open issues against merged PRs, investigates current code state in batches, verifies PR fixes via diffs, cross-validates findings across providers, and generates a structured report"
version: "1.0.0"
tags: ["github", "triage", "issues", "cross-validation", "report"]

context:
  repo_path: "."          # Local path to the cloned git repo (default: current directory)
  repo_name: "microsoft/amplifier-distro"  # GitHub org/repo
  focus: "bugs"           # Optional: "bugs", "enhancements", or "all"
  max_issues: ""          # Optional: max issues to fetch ("" = up to 200)
  batch_size: "5"         # Optional: issues per investigation batch (5-10 recommended)
  report_path: ""         # Optional: output path (default: <repo_path>/triage-report-<ts>.md)
  _approval_message: "all"  # Runtime: set by approval gate (default: investigate all issues)

rate_limiting:
  max_concurrent_llm: 3
  min_delay_ms: 500
  backoff:
    enabled: true
    initial_delay_ms: 2000
    max_delay_ms: 60000
    multiplier: 2.0

stages:
  # ===========================================================================
  # STAGE 1: DISCOVERY
  # Fetch issues and PRs from GitHub, cross-reference, produce initial triage.
  # ===========================================================================
  - name: "discovery"
    steps:
      # --- Fetch all open issues from GitHub ---
      - id: "fetch-open-issues"
        type: "bash"
        command: |
          set -euo pipefail
          cd "{{repo_path}}"

          focus="{{focus}}"
          max_issues="{{max_issues}}"

          # Build label filter based on focus area
          label_filter=""
          if [ "$focus" = "bugs" ]; then
            label_filter="--label bug"
          elif [ "$focus" = "enhancements" ]; then
            label_filter="--label enhancement"
          fi

          # Build limit flag
          if [ -n "$max_issues" ] && [ "$max_issues" != "0" ]; then
            limit_flag="--limit $max_issues"
          else
            limit_flag="--limit 200"
          fi

          gh issue list --repo "{{repo_name}}" --state open \
            --json number,title,body,labels \
            $label_filter $limit_flag
        output: "open_issues"
        parse_json: true
        timeout: 120

      # --- Fetch recently merged PRs ---
      - id: "fetch-merged-prs"
        type: "bash"
        command: |
          set -euo pipefail
          cd "{{repo_path}}"

          gh pr list --repo "{{repo_name}}" --state merged \
            --json number,title,body \
            --limit 200
        output: "merged_prs"
        parse_json: true
        timeout: 120

      # --- Cross-reference issues against merged PRs ---
      - id: "cross-reference"
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          You are triaging GitHub issues for **{{repo_name}}**.

          ## Open Issues (focus: {{focus}})
          {{open_issues}}

          ## Recently Merged PRs
          {{merged_prs}}

          ## Task

          Cross-reference every open issue against the merged PRs:

          1. Check if any PR title or body references the issue (e.g., "fixes #123", "closes #45")
          2. Check for semantic matches — PRs that change the same area or address the same problem
          3. Assign an initial assessment per issue:
             - **LIKELY_FIXED** — A merged PR clearly targets this issue
             - **POSSIBLY_FIXED** — A merged PR may partially or indirectly address it
             - **NO_LINKED_PR** — No merged PR appears related

          Return ONLY a JSON array, no markdown fences, no commentary:

          [
            {
              "issue_number": 123,
              "issue_title": "Short title",
              "labels": ["bug"],
              "initial_assessment": "LIKELY_FIXED",
              "linked_prs": [45, 67],
              "reasoning": "PR #45 title mentions fixing the auth timeout from this issue"
            }
          ]

          Sort by assessment: NO_LINKED_PR first, then POSSIBLY_FIXED, then LIKELY_FIXED.
        output: "initial_triage"
        parse_json: true
        timeout: 900

    approval:
      required: true
      prompt: |
        ## Initial Triage Complete

        {{initial_triage}}

        ---
        **Select issues for deep investigation.** Approve with one of:

        - **"all"** — Investigate every issue above
        - **"unsolved"** — Investigate only NO_LINKED_PR issues
        - **"12,34,56"** — Investigate specific issue numbers (comma-separated)

        Or **deny** to stop the workflow.
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 2: INVESTIGATION
  # Deep code investigation, PR diff verification, cross-provider review.
  # ===========================================================================
  - name: "investigation"
    steps:
      # --- Prepare investigation plan from user's approval selection ---
      - id: "prepare-investigation"
        type: "bash"
        command: |
          set -euo pipefail

          selection="{{_approval_message}}"

          # Write triage JSON safely via heredoc to avoid shell quoting issues
          _triage_tmp=$(mktemp)
          cat > "$_triage_tmp" << 'TRIAGE_JSON_EOF_7a3e9b'
          {{initial_triage}}
          TRIAGE_JSON_EOF_7a3e9b
          triage=$(cat "$_triage_tmp")
          rm -f "$_triage_tmp"

          # Default to "all" if user approved without a message
          if [ -z "$selection" ]; then
            selection="all"
          fi

          # Filter issues based on user's selection
          if [ "$selection" = "all" ]; then
            selected=$(echo "$triage" | jq -c '.')
          elif [ "$selection" = "unsolved" ]; then
            selected=$(echo "$triage" | jq -c \
              '[.[] | select(.initial_assessment == "NO_LINKED_PR")]')
          else
            # Parse comma-separated issue numbers
            numbers=$(echo "$selection" | tr ',' '\n' \
              | sed 's/[^0-9]//g' \
              | jq -R 'select(length > 0) | tonumber' \
              | jq -sc '.')
            selected=$(echo "$triage" | jq -c --argjson nums "$numbers" \
              '[.[] | select(.issue_number as $n | $nums | index($n))]')
          fi

          # Split selected issues into batches
          batch_size={{batch_size}}
          batches=$(echo "$selected" | jq -c \
            "[range(0; length; $batch_size) as \$i | .[\$i:\$i+$batch_size]]")

          # Extract issues with linked PRs (for PR diff verification)
          issues_with_prs=$(echo "$selected" | jq -c \
            '[.[] | select(.linked_prs | length > 0)]')
          pr_batches=$(echo "$issues_with_prs" | jq -c \
            "[range(0; length; $batch_size) as \$i | .[\$i:\$i+$batch_size]]")

          # Output the investigation plan
          jq -n \
            --argjson batches "$batches" \
            --argjson pr_batches "$pr_batches" \
            --argjson total "$(echo "$selected" | jq 'length')" \
            --argjson with_prs "$(echo "$issues_with_prs" | jq 'length')" \
            '{
              batches: $batches,
              pr_batches: $pr_batches,
              total_issues: $total,
              issues_with_prs: $with_prs,
              batch_count: ($batches | length),
              pr_batch_count: ($pr_batches | length)
            }'
        output: "plan"
        parse_json: true
        timeout: 60

      # --- Investigate code state per batch (Provider A: Anthropic preferred) ---
      - id: "investigate-code-state"
        foreach: "{{plan.batches}}"
        as: "issue_batch"
        parallel: 3
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          You are investigating open GitHub issues for **{{repo_name}}**.
          The repository is cloned at: {{repo_path}}

          ## Issues to Investigate (Batch)

          {{issue_batch}}

          ## Instructions

          For EACH issue in this batch:

          1. **Read the issue** carefully — understand the reported problem
          2. **Identify relevant source files** from the issue description, error messages, and file references
          3. **Read the source code** in those files to determine current state
          4. **Check recent git history**: `git log --oneline -10 -- <file>`
          5. **Determine your verdict:**
             - **SOLVED** — The issue is fixed in the current codebase
             - **PARTIALLY_SOLVED** — Some aspects addressed, others remain
             - **UNSOLVED** — The issue still exists as described

          Return ONLY a JSON array (no markdown fences):

          [
            {
              "issue_number": 123,
              "issue_title": "Title",
              "verdict": "SOLVED",
              "files_examined": ["src/foo.py:45-67", "src/bar.py"],
              "evidence": "Specific evidence supporting your verdict",
              "remaining_work": ""
            }
          ]
        collect: "code_investigations"
        parse_json: true
        timeout: 900
        on_error: "continue"

      # --- Verify PR fixes by reading actual diffs (Provider A: Anthropic preferred) ---
      - id: "verify-pr-fixes"
        foreach: "{{plan.pr_batches}}"
        as: "pr_batch"
        parallel: 3
        agent: "foundation:zen-architect"
        mode: "ANALYZE"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          You are verifying whether merged PRs actually fix reported GitHub issues
          in **{{repo_name}}** (local path: {{repo_path}}).

          ## Issues with Linked PRs (Batch)

          {{pr_batch}}

          ## Instructions

          For EACH issue in this batch:

          1. Read the issue to understand the reported problem
          2. For each linked PR number, fetch and read the diff:
             `gh pr diff <PR_NUMBER> --repo {{repo_name}}`
          3. Analyze the diff against the issue:
             - Does the PR change the right files?
             - Do the code changes address the root cause?
             - Are there edge cases the PR might miss?
          4. Assign a verdict per PR:
             - **FIXES_ISSUE** — Directly and completely addresses the issue
             - **PARTIALLY_FIXES** — Addresses some aspects but not all
             - **UNRELATED** — Does not actually fix this issue

          Return ONLY a JSON array (no markdown fences):

          [
            {
              "issue_number": 123,
              "pr_verifications": [
                {
                  "pr_number": 45,
                  "verdict": "FIXES_ISSUE",
                  "diff_summary": "Brief summary of PR changes",
                  "evidence": "How changes relate to the issue"
                }
              ],
              "overall_verdict": "FIXED",
              "explanation": "Overall assessment"
            }
          ]
        collect: "pr_verifications"
        parse_json: true
        timeout: 900
        on_error: "continue"

      # --- Cross-review: independent provider validates all findings ---
      - id: "cross-review"
        agent: "foundation:zen-architect"
        mode: "REVIEW"
        provider_preferences:
          - provider: openai
            model: gpt-*
          - provider: anthropic
            model: claude-sonnet-*
        prompt: |
          You are an INDEPENDENT REVIEWER. A different AI agent (Agent A)
          investigated GitHub issues for **{{repo_name}}** and produced these findings.

          YOUR ROLE: Critically review Agent A's work. Be skeptical and thorough.

          ## Code Investigation Findings (Agent A)
          {{code_investigations}}

          ## PR Verification Findings (Agent A)
          {{pr_verifications}}

          ## Review Criteria

          For each finding, evaluate:
          1. Is the verdict supported by cited evidence (specific files/lines)?
          2. Is the evidence sufficient, or could the verdict be wrong?
          3. Are there logical errors, contradictions, or unsupported claims?
          4. Were the right files examined, or could the issue be elsewhere?
          5. For PR verifications — did Agent A actually read the diff?

          If you DISAGREE, you may read source code at {{repo_path}} to verify.

          Return ONLY a JSON object (no markdown fences):

          {
            "reviews": [
              {
                "issue_number": 123,
                "original_verdict": "SOLVED",
                "reviewer_verdict": "AGREE",
                "revised_verdict": "SOLVED",
                "confidence": 8,
                "reasoning": "Evidence is strong — file was clearly modified to fix the bug"
              }
            ],
            "summary": "Overall quality assessment of Agent A's findings",
            "agreement_rate": "85%",
            "critical_disagreements": []
          }
        output: "cross_review"
        parse_json: true
        timeout: 900

    approval:
      required: true
      prompt: |
        ## Investigation Complete — Review Before Report

        **Issues investigated:** {{plan.total_issues}}
        **Issues with PR verification:** {{plan.issues_with_prs}}

        ### Cross-Review Summary
        {{cross_review}}

        ---
        **Approve** to generate the final triage report.
        **Deny** to stop here (findings are saved in the session).
      timeout: 0
      default: "deny"

  # ===========================================================================
  # STAGE 3: REPORT
  # Synthesize all findings into a structured report and write to file.
  # ===========================================================================
  - name: "report"
    steps:
      # --- Synthesize all findings into a markdown report ---
      - id: "synthesize"
        agent: "foundation:zen-architect"
        mode: "ARCHITECT"
        provider_preferences:
          - provider: anthropic
            model: claude-sonnet-*
          - provider: openai
            model: gpt-*
        prompt: |
          Compile a comprehensive **GitHub Issue Triage Report** for **{{repo_name}}**.

          ## Source Data

          ### Initial Triage (Issue-PR Cross-Reference)
          {{initial_triage}}

          ### Code Investigation Results
          {{code_investigations}}

          ### PR Verification Results
          {{pr_verifications}}

          ### Cross-Review (Independent Validation)
          {{cross_review}}

          ## Report Structure

          Generate a complete markdown report with these sections:

          # GitHub Issue Triage Report — {{repo_name}}
          *Generated: [today's date] | Focus: {{focus}} | Issues analyzed: {{plan.total_issues}}*

          ## Executive Summary
          - Total issues analyzed, breakdown by verdict (SOLVED / PARTIALLY SOLVED / UNSOLVED)
          - Cross-review agreement rate and confidence levels
          - Key findings and surprises

          ## Issues to Close (SOLVED)
          Table: Issue # | Title | Evidence | Linked PRs | Confidence

          ## Issues Needing Follow-Up (PARTIALLY SOLVED)
          Per issue: what was resolved, what remains, suggested next steps

          ## Issues Needing Attention (UNSOLVED)
          Per issue: current code state, root cause analysis, proposed solution, priority

          ## Disputed Findings
          Where Agent A and the Reviewer disagreed — both perspectives, recommended resolution

          ## Recommendations
          1. Issues safe to close (with justification)
          2. Issues to prioritize (with reasoning)
          3. Suggested next actions for the team

          ---

          DO NOT write any files. Return the complete markdown content only.
        output: "final_report"
        timeout: 900

      # --- Write report to file (guaranteed I/O via bash) ---
      - id: "write-report"
        type: "bash"
        command: |
          set -euo pipefail

          # Determine output path
          report_path="{{report_path}}"
          if [ -z "$report_path" ]; then
            report_path="{{repo_path}}/triage-report-$(date +%Y%m%d-%H%M%S).md"
          fi

          # Ensure directory exists
          mkdir -p "$(dirname "$report_path")"

          # Write report atomically: temp file then move
          cat > "${report_path}.tmp" << 'TRIAGE_REPORT_EOF_39f8a2c1'
          {{final_report}}
          TRIAGE_REPORT_EOF_39f8a2c1

          mv "${report_path}.tmp" "$report_path"

          # Verify write succeeded
          if [ -s "$report_path" ]; then
            bytes=$(wc -c < "$report_path")
            echo "Report written: $report_path ($bytes bytes)"
          else
            echo "ERROR: Report file is empty or write failed" >&2
            exit 1
          fi
        output: "final_output"
        timeout: 60
        on_error: "fail"